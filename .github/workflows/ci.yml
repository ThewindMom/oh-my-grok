name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-hook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: bash scripts/build-hook.sh
      - run: go test ./... -mod=mod -count=1
      - name: Run hook smoke tests
        env:
          GROK_PLUGIN_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          for t in hooks/test-*.sh; do
            case "$(basename "$t")" in
              test-inline-skill-gate.sh) continue ;;
            esac
            echo "== $t =="
            bash "$t"
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json syntax
        run: python3 -m json.tool plugin.json > /dev/null

      - name: Run hook smoke tests
        env:
          GROK_PLUGIN_ROOT: ${{ github.workspace }}
        run: |
          set -euo pipefail
          for t in hooks/test-*.sh; do
            case "$(basename "$t")" in
              test-inline-skill-gate.sh) continue ;;
            esac
            echo "== $t =="
            bash "$t"
          done